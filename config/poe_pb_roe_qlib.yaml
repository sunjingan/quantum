# POE PB+ROE Quant Strategy — qrun YAML config
#
# Usage:
#   source activate.sh
#   qrun config/poe_pb_roe_qlib.yaml
#
# This uses qlib's SimulatorExecutor + custom POEPBRoeStrategy.
# Results recorded to MLflow under experiment "poe_pb_roe_qlib".
qlib_init:
    provider_uri: "/Users/jingansun/Desktop/codex/quant/data/my_qlib"
    region: cn

market: &market hs300
benchmark: &benchmark SH000300

port_analysis_config: &port_analysis_config
    executor:
        class: SimulatorExecutor
        module_path: qlib.backtest.executor
        kwargs:
            time_per_step: day
            generate_portfolio_metrics: true
    strategy:
        class: POEPBRoeStrategy
        module_path: strategies.poe_pb_roe
        kwargs:
            provider_uri: "/Users/jingansun/Desktop/codex/quant/data/my_qlib"
            token_path: "/Users/jingansun/Desktop/codex/quant/config/tushare_token.txt"
            cache_dir: "/Users/jingansun/Desktop/codex/quant/data/tushare_cache"
            market: *market
            benchmark: *benchmark
            initial_cash: 500000
            pb_min: 0.1
            pb_max: 20.0
            roe_min: 0.0
            market_cap_min: 20.0
            pe_min: 0.1
            pe_max: 200.0
            max_per_industry: 2
            strong_cycle_max_1: 1
            weak_top_n_25: 25
            weak_broad_industry_max: 3
            weak_broad_strong_cycle_max_25: 5
            weak_rank_spread_band_count: 4
    backtest:
        start_time: 2018-01-02
        end_time: 2026-06-22
        account: 500000
        benchmark: *benchmark
        exchange_kwargs:
            freq: day
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5

task:
    model:
        class: POEPBRoeModel
        module_path: strategies.poe_pb_roe
        kwargs:
            provider_uri: "/Users/jingansun/Desktop/codex/quant/data/my_qlib"
            token_path: "/Users/jingansun/Desktop/codex/quant/config/tushare_token.txt"
            cache_dir: "/Users/jingansun/Desktop/codex/quant/data/tushare_cache"
            market: *market
            benchmark: *benchmark
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs:
                    start_time: 2015-01-04
                    end_time: 2026-06-22
                    fit_start_time: 2015-01-04
                    fit_end_time: 2017-12-29
                    instruments: *market
            segments:
                train: [2015-01-04, 2017-12-29]
                test:  [2018-01-02, 2026-06-22]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: false
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
